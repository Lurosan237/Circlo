name: circlo_safety
description: A privacy-first safety application using verified Safety Circles to help locate missing persons.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Networking
  dio: ^5.4.0
  socket_io_client: ^2.0.3+1
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Security
  crypto: ^3.0.3
  encrypt: ^5.0.3
  pointycastle: ^3.7.4
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  
  # Maps
  mapbox_gl: ^0.16.0
  
  # Utilities
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  uuid: ^4.3.3
  intl: ^0.19.0
  connectivity_plus: ^5.0.2
  
  # UI
  flutter_secure_storage: ^9.0.0
  go_router: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  mockito: ^5.4.4
  build_verify: ^3.1.0

flutter:
  uses-material-design: true
